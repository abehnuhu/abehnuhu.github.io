<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin — House of Baiden</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">

    <!-- Firebase SDK (compat) -->
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

    <style>
        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

        :root {
            --bg:        #0d0d0d;
            --surface:   #141414;
            --card:      #1a1a1a;
            --border:    rgba(196,167,71,0.18);
            --gold:      #c4a747;
            --gold-dim:  #9c7c2e;
            --gold-glow: rgba(196,167,71,0.12);
            --white:     #f8f8f8;
            --muted:     #888;
            --danger:    #e05252;
            --success:   #4caf76;
            --info:      #5b9bd5;
            --radius:    14px;
            --trans:     all 0.25s ease;
        }

        html { scroll-behavior: smooth; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--white);
            min-height: 100vh;
            padding: 0 0 60px;
        }

        /* ── TOP BAR ── */
        .topbar {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 18px 28px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .topbar-brand {
            font-family: 'Playfair Display', serif;
            font-size: 1.35rem;
            color: var(--white);
            text-decoration: none;
        }

        .topbar-brand span { color: var(--gold); }

        .topbar-right { display: flex; align-items: center; gap: 12px; }

        .tag-admin {
            background: var(--gold-glow);
            border: 1px solid var(--border);
            color: var(--gold);
            font-size: 0.72rem;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            padding: 4px 12px;
            border-radius: 30px;
        }

        .btn-logout {
            background: none;
            border: 1px solid rgba(224,82,82,0.4);
            color: var(--danger);
            padding: 8px 18px;
            border-radius: 8px;
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: var(--trans);
            font-family: inherit;
        }

        .btn-logout:hover {
            background: rgba(224,82,82,0.1);
        }

        /* ── LAYOUT ── */
        .page-wrap {
            max-width: 1100px;
            margin: 0 auto;
            padding: 36px 20px 0;
        }

        /* ── TOAST ── */
        #toast {
            position: fixed;
            bottom: 28px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: var(--card);
            border: 1px solid var(--border);
            color: var(--white);
            padding: 14px 26px;
            border-radius: 40px;
            font-size: 0.95rem;
            box-shadow: 0 8px 30px rgba(0,0,0,0.5);
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s, transform 0.3s;
            z-index: 9999;
            white-space: nowrap;
        }

        #toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }

        #toast.success { border-color: var(--success); color: var(--success); }
        #toast.error   { border-color: var(--danger);  color: var(--danger);  }
        #toast.info    { border-color: var(--info);    color: var(--info);    }

        /* ── SECTION TITLES ── */
        .section-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            color: var(--white);
            margin-bottom: 22px;
        }

        .section-label i { color: var(--gold); font-size: 1.1rem; }

        /* ── ADD PRODUCT CARD ── */
        .add-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            margin-bottom: 36px;
        }

        /* ── FORM GRID ── */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 640px) {
            .form-grid { grid-template-columns: 1fr; }
        }

        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full { grid-column: 1 / -1; }

        .form-group label {
            font-size: 0.82rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            color: var(--muted);
            font-weight: 500;
        }

        .form-group label .req { color: var(--gold); margin-left: 3px; }

        .form-group input,
        .form-group select,
        .form-group textarea {
            background: var(--surface);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            color: var(--white);
            font-family: inherit;
            font-size: 0.97rem;
            padding: 13px 16px;
            transition: var(--trans);
            outline: none;
            -webkit-appearance: none;
        }

        .form-group input::placeholder,
        .form-group textarea::placeholder { color: #444; }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: var(--gold);
            background: #1e1e1e;
        }

        .form-group select option { background: #1a1a1a; }

        .form-group textarea { resize: vertical; min-height: 100px; }

        /* ── IMAGE UPLOAD ── */
        .upload-zone {
            grid-column: 1 / -1;
            border: 2px dashed rgba(196,167,71,0.35);
            border-radius: var(--radius);
            padding: 36px 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--trans);
            background: var(--surface);
            position: relative;
        }

        .upload-zone:hover,
        .upload-zone.drag-over {
            border-color: var(--gold);
            background: var(--gold-glow);
        }

        .upload-zone input[type="file"] {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
            width: 100%;
            height: 100%;
        }

        .upload-icon { font-size: 2.4rem; color: var(--gold); margin-bottom: 12px; }

        .upload-zone h4 {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            color: var(--white);
            margin-bottom: 6px;
        }

        .upload-zone p {
            color: var(--muted);
            font-size: 0.88rem;
        }

        /* ── PREVIEW ── */
        .preview-wrap {
            grid-column: 1 / -1;
            display: none;
            align-items: center;
            gap: 20px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 20px;
        }

        .preview-wrap.visible { display: flex; }

        .preview-wrap img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
            flex-shrink: 0;
        }

        .preview-info { flex: 1; min-width: 0; }

        .preview-info .fname {
            font-size: 0.95rem;
            color: var(--white);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .preview-info .fsize {
            font-size: 0.8rem;
            color: var(--muted);
            margin-top: 3px;
        }

        .preview-status {
            font-size: 0.82rem;
            margin-top: 6px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .preview-status.uploading { color: var(--info); }
        .preview-status.done      { color: var(--success); }
        .preview-status.fail      { color: var(--danger); }

        .btn-remove-img {
            background: rgba(224,82,82,0.12);
            border: 1px solid rgba(224,82,82,0.3);
            color: var(--danger);
            width: 36px;
            height: 36px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            transition: var(--trans);
        }

        .btn-remove-img:hover { background: rgba(224,82,82,0.25); }

        /* ── SUBMIT BUTTON ── */
        .btn-submit {
            grid-column: 1 / -1;
            background: var(--gold);
            color: #0d0d0d;
            border: none;
            border-radius: 10px;
            padding: 15px 28px;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: var(--trans);
            letter-spacing: 0.3px;
        }

        .btn-submit:hover:not(:disabled) {
            background: var(--gold-dim);
            transform: translateY(-1px);
        }

        .btn-submit:disabled {
            opacity: 0.45;
            cursor: not-allowed;
            transform: none;
        }

        /* ── PRODUCTS LIST ── */
        .products-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
        }

        .products-header {
            padding: 24px 28px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
            gap: 12px;
        }

        .products-header .section-label { margin-bottom: 0; }

        .product-count {
            background: var(--gold-glow);
            border: 1px solid var(--border);
            color: var(--gold);
            padding: 4px 14px;
            border-radius: 30px;
            font-size: 0.82rem;
            font-weight: 500;
        }

        /* ── PRODUCT ROWS ── */
        #productsContainer { padding: 8px 0; }

        .product-row {
            display: grid;
            grid-template-columns: 64px 1fr auto auto auto;
            align-items: center;
            gap: 16px;
            padding: 16px 28px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            transition: var(--trans);
        }

        .product-row:last-child { border-bottom: none; }

        .product-row:hover { background: rgba(255,255,255,0.02); }

        .prod-thumb {
            width: 64px;
            height: 64px;
            object-fit: cover;
            border-radius: 10px;
            border: 1px solid var(--border);
            background: var(--surface);
        }

        .prod-name {
            font-size: 0.97rem;
            font-weight: 500;
            color: var(--white);
            margin-bottom: 4px;
        }

        .prod-desc {
            font-size: 0.8rem;
            color: var(--muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 260px;
        }

        .prod-price {
            font-size: 1rem;
            font-weight: 600;
            color: var(--gold);
            white-space: nowrap;
        }

        .cat-badge {
            font-size: 0.75rem;
            padding: 4px 12px;
            border-radius: 20px;
            white-space: nowrap;
            font-weight: 500;
        }

        .cat-badge.perfume {
            background: rgba(102,126,234,0.15);
            color: #8fa4f3;
            border: 1px solid rgba(102,126,234,0.3);
        }

        .cat-badge.skincare {
            background: rgba(240,147,251,0.12);
            color: #e58de8;
            border: 1px solid rgba(240,147,251,0.25);
        }

        .row-actions { display: flex; gap: 8px; }

        .btn-edit, .btn-del {
            border: none;
            border-radius: 8px;
            padding: 8px 14px;
            font-size: 0.83rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            font-family: inherit;
            transition: var(--trans);
        }

        .btn-edit {
            background: rgba(196,167,71,0.12);
            color: var(--gold);
            border: 1px solid rgba(196,167,71,0.25);
        }

        .btn-edit:hover { background: rgba(196,167,71,0.22); }

        .btn-del {
            background: rgba(224,82,82,0.1);
            color: var(--danger);
            border: 1px solid rgba(224,82,82,0.25);
        }

        .btn-del:hover { background: rgba(224,82,82,0.2); }

        /* ── EMPTY / LOADING ── */
        .state-box {
            padding: 60px 20px;
            text-align: center;
            color: var(--muted);
        }

        .state-box i { font-size: 2.5rem; color: var(--gold); margin-bottom: 16px; display: block; }
        .state-box h3 { color: var(--white); margin-bottom: 8px; font-family: 'Playfair Display', serif; }

        .spinner {
            width: 36px; height: 36px;
            border: 3px solid rgba(255,255,255,0.08);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* ── EDIT MODAL ── */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.85);
            z-index: 500;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal-overlay.open { display: flex; }

        .modal {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            width: 100%;
            max-width: 480px;
            position: relative;
        }

        .modal-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--white);
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .modal-title i { color: var(--gold); }

        .modal-close {
            position: absolute;
            top: 18px; right: 18px;
            background: none;
            border: none;
            color: var(--muted);
            font-size: 1.2rem;
            cursor: pointer;
            transition: var(--trans);
        }

        .modal-close:hover { color: var(--white); }

        .modal-form { display: flex; flex-direction: column; gap: 16px; }

        .modal-form .form-group { gap: 7px; }

        .modal-preview-wrap {
            display: flex;
            align-items: center;
            gap: 14px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 14px;
        }

        .modal-preview-wrap img {
            width: 60px; height: 60px;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid var(--border);
        }

        .modal-preview-wrap .mpinfo { flex: 1; font-size: 0.85rem; color: var(--muted); }
        .modal-preview-wrap .mpstatus { font-size: 0.8rem; margin-top: 4px; }
        .modal-preview-wrap .mpstatus.done { color: var(--success); }
        .modal-preview-wrap .mpstatus.uploading { color: var(--info); }

        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 8px;
        }

        .btn-save {
            flex: 1;
            background: var(--gold);
            color: #0d0d0d;
            border: none;
            border-radius: 10px;
            padding: 13px;
            font-family: inherit;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: var(--trans);
        }

        .btn-save:hover:not(:disabled) { background: var(--gold-dim); }
        .btn-save:disabled { opacity: 0.4; cursor: not-allowed; }

        .btn-cancel {
            padding: 13px 20px;
            border: 1px solid rgba(255,255,255,0.1);
            background: none;
            color: var(--muted);
            border-radius: 10px;
            cursor: pointer;
            font-family: inherit;
            font-size: 0.95rem;
            transition: var(--trans);
        }

        .btn-cancel:hover { color: var(--white); border-color: rgba(255,255,255,0.25); }

        /* ── RESPONSIVE ROWS ── */
        @media (max-width: 700px) {
            .product-row {
                grid-template-columns: 54px 1fr;
                grid-template-rows: auto auto;
                padding: 14px 18px;
                gap: 10px;
            }

            .prod-thumb { width: 54px; height: 54px; grid-row: 1 / 3; }

            .prod-price, .cat-badge { font-size: 0.85rem; }

            .row-actions {
                grid-column: 2;
                justify-content: flex-start;
            }

            .btn-edit, .btn-del { padding: 7px 12px; font-size: 0.8rem; }

            .add-card { padding: 22px 16px; }
            .topbar { padding: 14px 16px; }
            .products-header { padding: 18px; }
        }
    </style>
</head>
<body>

<!-- TOP BAR -->
<header class="topbar">
    <a href="index.html" class="topbar-brand">House of <span>Baiden</span></a>
    <div class="topbar-right">
        <span class="tag-admin">Admin</span>
        <button class="btn-logout" id="logoutBtn">
            <i class="fas fa-sign-out-alt"></i> Logout
        </button>
    </div>
</header>

<!-- TOAST -->
<div id="toast"></div>

<div class="page-wrap">

    <!-- ADD PRODUCT -->
    <div class="add-card">
        <div class="section-label">
            <i class="fas fa-plus-circle"></i>
            Add New Product
        </div>

        <div class="form-grid">
            <div class="form-group">
                <label>Product Name <span class="req">*</span></label>
                <input type="text" id="productName" placeholder="e.g. Intense Man EDP">
            </div>

            <div class="form-group">
                <label>Price (₵) <span class="req">*</span></label>
                <input type="number" id="productPrice" placeholder="e.g. 220" min="0">
            </div>

            <div class="form-group">
                <label>Category <span class="req">*</span></label>
                <select id="productCategory">
                    <option value="" disabled selected>Select category</option>
                    <option value="perfume">Perfume / Fragrance</option>
                    <option value="skincare">Skincare</option>
                </select>
            </div>

            <div class="form-group">
                <label>Description <span style="color:#555;font-size:0.78rem;">(optional)</span></label>
                <input type="text" id="productDesc" placeholder="Short description">
            </div>

            <!-- UPLOAD ZONE -->
            <div class="upload-zone" id="uploadZone">
                <input type="file" id="imageInput" accept="image/*" capture>
                <div class="upload-icon"><i class="fas fa-image"></i></div>
                <h4>Tap to upload product photo</h4>
                <p>From your camera, gallery, or computer &nbsp;·&nbsp; JPG, PNG, WEBP</p>
            </div>

            <!-- PREVIEW -->
            <div class="preview-wrap" id="previewWrap">
                <img id="previewImg" src="" alt="preview">
                <div class="preview-info">
                    <div class="fname" id="previewName">—</div>
                    <div class="fsize" id="previewSize">—</div>
                    <div class="preview-status" id="previewStatus"></div>
                </div>
                <button class="btn-remove-img" id="removeImgBtn" title="Remove image">
                    <i class="fas fa-times"></i>
                </button>
            </div>

            <input type="hidden" id="imageDataUrl">

            <button class="btn-submit" id="addProductBtn">
                <i class="fas fa-plus"></i> Add Product
            </button>
        </div>
    </div>

    <!-- PRODUCTS LIST -->
    <div class="products-card">
        <div class="products-header">
            <div class="section-label">
                <i class="fas fa-boxes"></i>
                Your Products
            </div>
            <span class="product-count" id="productCount">Loading…</span>
        </div>
        <div id="productsContainer">
            <div class="state-box">
                <div class="spinner"></div>
                <p>Loading products…</p>
            </div>
        </div>
    </div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="editModal">
    <div class="modal">
        <button class="modal-close" id="modalClose"><i class="fas fa-times"></i></button>
        <div class="modal-title"><i class="fas fa-pen"></i> Edit Product</div>
        <input type="hidden" id="editId">
        <div class="modal-form">
            <div class="form-group">
                <label>Product Name <span class="req">*</span></label>
                <input type="text" id="editName" placeholder="Product name">
            </div>
            <div class="form-group">
                <label>Price (₵) <span class="req">*</span></label>
                <input type="number" id="editPrice" placeholder="Price" min="0">
            </div>
            <div class="form-group">
                <label>Category <span class="req">*</span></label>
                <select id="editCategory">
                    <option value="perfume">Perfume / Fragrance</option>
                    <option value="skincare">Skincare</option>
                </select>
            </div>
            <div class="form-group">
                <label>Description</label>
                <input type="text" id="editDesc" placeholder="Short description (optional)">
            </div>

            <!-- Edit image -->
            <div class="form-group">
                <label>Replace Image <span style="color:#555;font-size:0.78rem;">(optional)</span></label>
                <div class="modal-preview-wrap">
                    <img id="editPreviewImg" src="" alt="current">
                    <div class="mpinfo">
                        <div>Current image</div>
                        <div class="mpstatus" id="editImgStatus"></div>
                    </div>
                    <label style="cursor:pointer; color:var(--gold); font-size:0.85rem; white-space:nowrap;">
                        <i class="fas fa-camera"></i> Change
                        <input type="file" id="editImageInput" accept="image/*" style="display:none">
                    </label>
                </div>
            </div>
            <input type="hidden" id="editImageDataUrl">

            <div class="modal-actions">
                <button class="btn-cancel" id="modalCancel">Cancel</button>
                <button class="btn-save" id="saveEditBtn">Save Changes</button>
            </div>
        </div>
    </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function () {

    // ── FIREBASE ──
    const firebaseConfig = {
        apiKey: "AIzaSyDl6pEFAsr6M_T-eAuE2FuMS3kOOp1LBKs",
        authDomain: "house-of-baiden.firebaseapp.com",
        projectId: "house-of-baiden",
        storageBucket: "house-of-baiden.firebasestorage.app",
        messagingSenderId: "220065196721",
        appId: "1:220065196721:web:8fe9ab0c991b8d04dc1090"
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();

    // ── AUTH CHECK ──
    const isLoggedIn  = localStorage.getItem('adminLoggedIn');
    const loginExpiry = localStorage.getItem('adminLoginExpiry');
    if (!isLoggedIn || !loginExpiry || Date.now() > parseInt(loginExpiry)) {
        localStorage.removeItem('adminLoggedIn');
        localStorage.removeItem('adminLoginExpiry');
        window.location.href = 'index.html';
        return;
    }

    // ── TOAST ──
    function toast(msg, type = 'info') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = 'show ' + type;
        clearTimeout(el._t);
        el._t = setTimeout(() => el.className = '', 3000);
    }

    // ── IMGBB ──
    const IMGBB_KEY = '915ef79a1d46e47d5a39b55157729f66';

    function formatBytes(bytes) {
        if (bytes < 1024) return bytes + ' B';
        if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
        return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }

    async function uploadToImgBB(file) {
        const formData = new FormData();
        formData.append('key', IMGBB_KEY);
        formData.append('image', file);
        const res  = await fetch('https://api.imgbb.com/1/upload', { method: 'POST', body: formData });
        const data = await res.json();
        if (!data.success) throw new Error(data.error?.message || 'Upload failed');
        return data.data.display_url;
    }

    // ── ADD PRODUCT IMAGE ──
    const uploadZone    = document.getElementById('uploadZone');
    const imageInput    = document.getElementById('imageInput');
    const previewWrap   = document.getElementById('previewWrap');
    const previewImg    = document.getElementById('previewImg');
    const previewName   = document.getElementById('previewName');
    const previewSize   = document.getElementById('previewSize');
    const previewStatus = document.getElementById('previewStatus');
    const removeImgBtn  = document.getElementById('removeImgBtn');
    const imageDataUrl  = document.getElementById('imageDataUrl');

    imageInput.addEventListener('change', async function () {
        const file = this.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { toast('Please choose an image file', 'error'); return; }
        if (file.size > 32 * 1024 * 1024) { toast('Image must be under 32 MB', 'error'); return; }

        // show local preview immediately
        previewImg.src            = URL.createObjectURL(file);
        previewName.textContent   = file.name;
        previewSize.textContent   = formatBytes(file.size);
        previewStatus.innerHTML   = '<i class="fas fa-spinner fa-spin"></i> Uploading image…';
        previewStatus.className   = 'preview-status uploading';
        imageDataUrl.value        = '';

        uploadZone.style.display  = 'none';
        previewWrap.classList.add('visible');

        try {
            const url = await uploadToImgBB(file);
            imageDataUrl.value          = url;
            previewStatus.innerHTML     = '<i class="fas fa-check-circle"></i> Upload complete';
            previewStatus.className     = 'preview-status done';
        } catch (err) {
            console.error(err);
            toast('Image upload failed — check your connection and try again', 'error');
            previewStatus.innerHTML     = '<i class="fas fa-times-circle"></i> Upload failed — remove and retry';
            previewStatus.className     = 'preview-status fail';
        }
    });

    // drag-over styling
    uploadZone.addEventListener('dragover', e => { e.preventDefault(); uploadZone.classList.add('drag-over'); });
    uploadZone.addEventListener('dragleave', () => uploadZone.classList.remove('drag-over'));
    uploadZone.addEventListener('drop', e => {
        e.preventDefault();
        uploadZone.classList.remove('drag-over');
        if (e.dataTransfer.files[0]) {
            imageInput.files = e.dataTransfer.files;
            imageInput.dispatchEvent(new Event('change'));
        }
    });

    function resetUpload() {
        imageInput.value      = '';
        imageDataUrl.value    = '';
        previewWrap.classList.remove('visible');
        uploadZone.style.display = '';
        previewImg.src         = '';
        previewStatus.textContent = '';
    }

    removeImgBtn.addEventListener('click', resetUpload);

    // ── ADD PRODUCT ──
    document.getElementById('addProductBtn').addEventListener('click', async function () {
        const name     = document.getElementById('productName').value.trim();
        const price    = document.getElementById('productPrice').value.trim();
        const category = document.getElementById('productCategory').value;
        const desc     = document.getElementById('productDesc').value.trim();
        const image    = imageDataUrl.value;

        if (!name)     { toast('Product name is required', 'error'); return; }
        if (!price)    { toast('Price is required', 'error'); return; }
        if (!category) { toast('Select a category', 'error'); return; }
        if (!image)    { toast('Upload a product image', 'error'); return; }

        this.disabled = true;
        this.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Saving…';

        try {
            const data = { name, price, category, image, createdAt: firebase.firestore.FieldValue.serverTimestamp() };
            if (desc) data.description = desc;
            await db.collection('products').add(data);
            toast('Product added!', 'success');
            document.getElementById('productName').value  = '';
            document.getElementById('productPrice').value = '';
            document.getElementById('productCategory').value = '';
            document.getElementById('productDesc').value  = '';
            resetUpload();
            loadProducts();
        } catch (err) {
            console.error(err);
            toast('Error saving product. Try again.', 'error');
        } finally {
            this.disabled = false;
            this.innerHTML = '<i class="fas fa-plus"></i> Add Product';
        }
    });

    // ── LOAD PRODUCTS ──
    async function loadProducts() {
        const container = document.getElementById('productsContainer');
        const countEl   = document.getElementById('productCount');
        container.innerHTML = '<div class="state-box"><div class="spinner"></div><p>Loading…</p></div>';

        try {
            const snap = await db.collection('products').orderBy('createdAt', 'desc').get();
            countEl.textContent = snap.size + ' product' + (snap.size !== 1 ? 's' : '');

            if (snap.empty) {
                container.innerHTML = `
                    <div class="state-box">
                        <i class="fas fa-box-open"></i>
                        <h3>No products yet</h3>
                        <p>Add your first product above.</p>
                    </div>`;
                return;
            }

            container.innerHTML = '';
            snap.forEach(doc => {
                const p  = doc.data();
                const id = doc.id;
                const row = document.createElement('div');
                row.className = 'product-row';
                row.innerHTML = `
                    <img class="prod-thumb" src="${p.image || ''}" alt="${p.name}" onerror="this.style.opacity='0.3'">
                    <div>
                        <div class="prod-name">${p.name}</div>
                        <div class="prod-desc">${p.description || '<span style="color:#444">No description</span>'}</div>
                    </div>
                    <div class="prod-price">₵${p.price}</div>
                    <span class="cat-badge ${p.category}">${p.category === 'perfume' ? 'Perfume' : 'Skincare'}</span>
                    <div class="row-actions">
                        <button class="btn-edit" data-id="${id}"><i class="fas fa-pen"></i> Edit</button>
                        <button class="btn-del"  data-id="${id}"><i class="fas fa-trash"></i></button>
                    </div>`;
                container.appendChild(row);
            });

            // event delegation
            container.querySelectorAll('.btn-edit').forEach(btn =>
                btn.addEventListener('click', () => openEditModal(btn.dataset.id)));
            container.querySelectorAll('.btn-del').forEach(btn =>
                btn.addEventListener('click', () => deleteProduct(btn.dataset.id)));

        } catch (err) {
            console.error(err);
            countEl.textContent = 'Error';
            container.innerHTML = `
                <div class="state-box">
                    <i class="fas fa-exclamation-triangle" style="color:var(--danger)"></i>
                    <h3>Failed to load</h3>
                    <p>Check your connection and refresh.</p>
                </div>`;
        }
    }

    // ── DELETE ──
    async function deleteProduct(id) {
        if (!confirm('Delete this product? This cannot be undone.')) return;
        try {
            await db.collection('products').doc(id).delete();
            toast('Product deleted', 'success');
            loadProducts();
        } catch {
            toast('Error deleting product', 'error');
        }
    }

    // ── EDIT MODAL ──
    const editModal     = document.getElementById('editModal');
    const editIdInput   = document.getElementById('editId');
    const editName      = document.getElementById('editName');
    const editPrice     = document.getElementById('editPrice');
    const editCategory  = document.getElementById('editCategory');
    const editDesc      = document.getElementById('editDesc');
    const editPreviewImg    = document.getElementById('editPreviewImg');
    const editImgStatus     = document.getElementById('editImgStatus');
    const editImageInput    = document.getElementById('editImageInput');
    const editImageDataUrl  = document.getElementById('editImageDataUrl');
    const saveEditBtn       = document.getElementById('saveEditBtn');

    async function openEditModal(id) {
        try {
            const doc = await db.collection('products').doc(id).get();
            const p   = doc.data();
            editIdInput.value       = id;
            editName.value          = p.name || '';
            editPrice.value         = p.price || '';
            editCategory.value      = p.category || 'perfume';
            editDesc.value          = p.description || '';
            editPreviewImg.src      = p.image || '';
            editImageDataUrl.value  = p.image || '';
            editImgStatus.textContent = '';
            editImgStatus.className   = 'mpstatus';
            editModal.classList.add('open');
        } catch {
            toast('Could not load product', 'error');
        }
    }

    editImageInput.addEventListener('change', async function () {
        const file = this.files[0];
        if (!file) return;
        if (!file.type.startsWith('image/')) { toast('Choose an image file', 'error'); return; }
        if (file.size > 32 * 1024 * 1024) { toast('Image must be under 32 MB', 'error'); return; }
        editPreviewImg.src        = URL.createObjectURL(file);
        editImgStatus.innerHTML   = '<i class="fas fa-spinner fa-spin"></i> Uploading…';
        editImgStatus.className   = 'mpstatus uploading';
        saveEditBtn.disabled      = true;
        try {
            const url = await uploadToImgBB(file);
            editImageDataUrl.value    = url;
            editImgStatus.innerHTML   = '<i class="fas fa-check-circle"></i> New image ready';
            editImgStatus.className   = 'mpstatus done';
        } catch {
            toast('Image upload failed — try again', 'error');
            editImgStatus.innerHTML   = '<i class="fas fa-times-circle"></i> Upload failed';
            editImgStatus.className   = 'mpstatus fail';
        } finally {
            saveEditBtn.disabled = false;
        }
    });

    function closeModal() { editModal.classList.remove('open'); }

    document.getElementById('modalClose').addEventListener('click', closeModal);
    document.getElementById('modalCancel').addEventListener('click', closeModal);
    editModal.addEventListener('click', e => { if (e.target === editModal) closeModal(); });

    saveEditBtn.addEventListener('click', async function () {
        const id       = editIdInput.value;
        const name     = editName.value.trim();
        const price    = editPrice.value.trim();
        const category = editCategory.value;
        const desc     = editDesc.value.trim();
        const image    = editImageDataUrl.value;

        if (!name)  { toast('Name is required', 'error'); return; }
        if (!price) { toast('Price is required', 'error'); return; }

        this.disabled = true;
        this.textContent = 'Saving…';

        try {
            const data = { name, price, category, image };
            if (desc) data.description = desc; else data.description = '';
            await db.collection('products').doc(id).update(data);
            toast('Product updated!', 'success');
            closeModal();
            loadProducts();
        } catch (err) {
            console.error(err);
            toast('Error saving changes', 'error');
        } finally {
            this.disabled = false;
            this.textContent = 'Save Changes';
        }
    });

    // ── LOGOUT ──
    document.getElementById('logoutBtn').addEventListener('click', function () {
        localStorage.removeItem('adminLoggedIn');
        localStorage.removeItem('adminLoginExpiry');
        window.location.href = 'index.html';
    });

    // Prevent accidental enter submit
    document.addEventListener('keydown', e => {
        if (e.key === 'Enter' && e.target.tagName !== 'TEXTAREA' && e.target.tagName !== 'BUTTON') {
            e.preventDefault();
        }
    });

    // ── INIT ──
    loadProducts();
});
</script>
</body>
</html>
